name: Seguridad y Dependencias

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  seguridad:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v4
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Instalar dependencias pip
        run: pip install -r backend/requirements.txt
      - name: Instalar dependencias npm
        run: cd app-agora && npm install
      - name: Ejecutar escaneo de seguridad
        run: bash scripts/seguridad_ci.sh
